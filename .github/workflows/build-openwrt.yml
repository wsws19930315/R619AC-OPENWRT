#=============================================================
# R619AC (竞斗云2.0) OpenWRT 24.10 自动编译
# 基于 P3TERX/Actions-OpenWrt 模板
# 源码：OpenWRT 官方 v24.10.7
# 科学上网：Passwall
#=============================================================

name: Build OpenWrt for R619AC

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH 远程调试（用于 menuconfig）'
        required: false
        default: 'false'
        type: boolean

  # 定时编译（可选，每月1号自动编译）
  # schedule:
  #   - cron: '0 2 1 * *'

  # 推送 .config 文件时自动触发
  push:
    branches:
      - main
    paths:
      - '.config'
      - 'diy-part1.sh'
      - 'diy-part2.sh'
      - '.github/workflows/build-openwrt.yml'

env:
  REPO_URL: https://git.openwrt.org/openwrt/openwrt.git
  REPO_BRANCH: v24.10.7
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghcli
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-ply \
          python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆 OpenWRT 源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义 feeds（diy-part1.sh）
      run: |
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置（diy-part2.sh）
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 校验 Passwall 配套 Xray 核心
      run: |
        cd openwrt
        XRAY_MAKEFILE=package/feeds/passwall_packages/xray-core/Makefile
        test -f "$XRAY_MAKEFILE"
        test ! -e package/feeds/packages/xray-core
        XRAY_VERSION=$(sed -n 's/^PKG_VERSION:=//p' "$XRAY_MAKEFILE" | head -n 1)
        test -n "$XRAY_VERSION"
        dpkg --compare-versions "$XRAY_VERSION" ge "26.7.11"
        echo "已选中 Passwall xray-core $XRAY_VERSION"

    - name: SSH 远程调试（可选）
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 下载编译依赖
      id: package
      run: |
        cd openwrt
        make defconfig
        echo "===== 导出 defconfig 后的完整配置用于排查 ====="
        cp .config .config.full
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 导出完整配置（用于排查网口问题）
      uses: actions/upload-artifact@v4
      with:
        name: defconfig-full
        path: openwrt/.config.full

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查磁盘空间
      if: (!cancelled())
      run: df -hT

    - name: 整理固件文件
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 Artifacts
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        name: OpenWrt_R619AC_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成 Release Tag
      id: tag
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "## R619AC OpenWRT 固件" >> release.txt
        echo "" >> release.txt
        echo "- 源码：OpenWRT 官方 ${{ env.REPO_BRANCH }}" >> release.txt
        echo "- 设备：P&W R619AC 128M" >> release.txt
        echo "- 编译时间：$(date +"%Y-%m-%d %H:%M")" >> release.txt
        echo "- 包含：Passwall + LuCI 中文 + 基础工具" >> release.txt
        echo "" >> release.txt
        echo "### 刷机建议" >> release.txt
        echo "" >> release.txt
        echo "1. OpBoot 先刷官方 24.10.0 factory.ubi 打底。" >> release.txt
        echo "2. 进入官方 OpenWrt 后，在 LuCI 备份/升级页面刷本 Release 的 sysupgrade.bin。" >> release.txt
        echo "3. 从官方 24.10.0 打底系统升级时，建议勾选保留配置。" >> release.txt
        echo "4. 不建议直接用 OpBoot 首刷本 Release 的自编译 factory.ubi。" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布 Release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 清理旧的 workflow 记录
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 30
        keep_minimum_runs: 3

    - name: 清理旧的 Release
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
